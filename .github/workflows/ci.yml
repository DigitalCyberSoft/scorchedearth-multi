name: CI

# Typecheck + production build on every push and pull request -- the self-contained
# gate. The full differential vitest suite (incl. the mp_lockstep determinism gate)
# is intentionally NOT run in CI: it reads ~77 MB of golden vectors generated from
# the separate scorch-py Python port (oracle/vectors/, gitignored by design;
# regenerate locally with oracle/dump_*.py), so the differential suite stays a local
# pre-push gate. deploy.yml handles the build + Pages publish on push to master.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Typecheck + build (tsc --noEmit && vite build; vector-free)
        run: npm run build
