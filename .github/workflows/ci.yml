name: CI

# Typecheck + the full vitest suite (incl. the mp_lockstep determinism gate) on
# every push and pull request. This is the quality gate; deploy.yml (build + Pages
# publish) runs separately on push to master.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Test (vitest run; uncapped -- no systemd on the runner)
        run: npm run test:uncapped
